{% extends "base.html" %}

{% block content %}

<style>
.success-wrap{
  max-width:800px;
  margin:80px auto;
  padding:40px;
  text-align:center;
  background:rgba(255,255,255,0.8);
  border:1px solid #e5dcd2;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(90, 68, 53, 0.08);
}

.success-icon{
  font-size:40px;
  margin-bottom:20px;
}

.success-title{
  font-size:36px;
  margin-bottom:10px;
  color:#2f2a26;
}

.success-text{
  color:#6f6259;
  font-size:16px;
  line-height:1.7;
  margin-bottom:30px;
}

.btn{
  display:inline-block;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
}

.btn-primary{
  background:#2f2a26;
  color:white;
}

.btn-primary:hover{
  opacity:0.95;
}
</style>

<div class="success-wrap">

  <div class="success-icon">✓</div>

  <h1 class="success-title">Request sent</h1>

  <p class="success-text">
    Thank you — your request has been received.<br>
    I’ll review it and get back to you shortly with the next steps.
  </p>

  <a class="btn btn-primary" href="{% url 'gallery:gallery_list' %}">
    Back to gallery
  </a>

</div>

{% endblock %}
